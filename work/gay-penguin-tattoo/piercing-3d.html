<style>
:root{--pink:#ff3d8b;--pink-d:#d81b6a;--ink:#2b2330;--cream:#fff8fc}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Nunito',sans-serif;background:radial-gradient(120% 120% at 50% 0%,#fff8fc 0%,#ffe6f1 60%,#ffd7ea 100%);color:var(--ink);overflow:hidden}
.rainbow{height:5px;background:linear-gradient(90deg,#ff5c5c,#ffb24c,#ffe14c,#5cd97a,#4cc4ff,#9b6cff,#ff6cd4);position:fixed;top:0;left:0;right:0;z-index:8}
#stage{position:fixed;inset:0}
canvas{display:block;touch-action:none}
.hud{position:fixed;left:0;right:0;top:0;z-index:6;text-align:center;padding:16px 14px 6px;pointer-events:none}
.hud h1{font-family:'Fredoka';font-weight:700;font-size:21px}
.hud h1 b{color:var(--pink-d)}
.hud p{font-size:13px;color:#7c6a78;margin-top:2px}
.regions{position:fixed;top:62px;left:50%;transform:translateX(-50%);z-index:7;display:flex;gap:5px;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border:1px solid #ffd0e4;border-radius:999px;padding:5px}
.regions button{font:600 13.5px Fredoka;border:0;background:transparent;color:#7c6a78;padding:7px 16px;border-radius:999px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.regions button.on{background:var(--pink-d);color:#fff}
.tray{position:fixed;left:0;right:0;bottom:0;z-index:6;padding:10px 12px calc(12px + env(safe-area-inset-bottom));display:flex;gap:9px;justify-content:center;flex-wrap:wrap;align-items:flex-end}
.pc{display:flex;flex-direction:column;align-items:center;gap:5px;background:rgba(255,255,255,.82);backdrop-filter:blur(8px);border:2px solid #ffd0e4;border-radius:16px;padding:8px 10px 7px;cursor:pointer;min-width:74px;transition:.14s;-webkit-tap-highlight-color:transparent}
.pc.on{border-color:var(--pink-d);background:#fff;box-shadow:0 8px 22px rgba(216,27,106,.22);transform:translateY(-3px)}
.pc .th{width:42px;height:42px;border-radius:10px;background:#fff center/contain no-repeat;border:1px solid #f1dbe6}
.pc small{font-family:'Fredoka';font-weight:600;font-size:11px;color:var(--ink)}
.pc .chk{font-size:9px;font-weight:700;color:var(--pink-d);height:11px}
.controls{position:fixed;right:10px;top:62px;z-index:7;display:flex;flex-direction:column;gap:6px}
.controls button{font:600 12px Fredoka;border:1.5px solid #ffd0e4;background:rgba(255,255,255,.9);color:var(--pink-d);padding:7px 11px;border-radius:999px;cursor:pointer}
.tag{position:fixed;left:9px;bottom:calc(6px + env(safe-area-inset-bottom));z-index:6;font-size:10px;color:#b08aa0;opacity:.85}
.loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:9;background:#ffe6f1;transition:opacity .5s}
.loading.gone{opacity:0;pointer-events:none}
.spin{width:42px;height:42px;border-radius:50%;border:4px solid #ffd0e4;border-top-color:var(--pink-d);animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading span{font-family:'Fredoka';color:var(--pink-d);font-weight:600}
/* narrow screens: stack controls BELOW the tabs so they don't collide */
@media (max-width:560px){
  .hud{padding:12px 12px 4px}
  .hud h1{font-size:18px}
  .hud p{font-size:11px}
  .regions{top:54px;padding:4px;gap:3px}
  .regions button{padding:7px 12px;font-size:12.5px}
  .controls{top:100px;right:auto;left:50%;transform:translateX(-50%);flex-direction:row;gap:8px}
}
</style></head>
<body>
<div class="rainbow"></div>
<div id="stage"></div>
<div class="hud"><h1>Try It On <b>— in 3D</b> 🐧</h1><p>Tap a body part to zoom in · tap a piece to try it on · drag to spin</p></div>
<div class="regions" id="regions"></div>
<div class="controls"><button id="resetBtn">⤢ Full view</button><button id="clearBtn">Clear all</button></div>
<div class="tray" id="tray"></div>
<div class="tag">3D preview · real shop jewelry</div>
<div class="loading" id="loading"><div class="spin"></div><span>Loading the 3D try-on…</span></div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const G='jewelry/web/';
const CATALOG={
  ear_cz:{name:'CZ stud',region:'ear',glb:G+'ear_cz.glb',disp:'tex'}, star_stud:{name:'Star',region:'ear',glb:G+'star_stud.glb',disp:'silver'},
  sparkle_star:{name:'Sparkle',region:'ear',glb:G+'sparkle_star.glb',disp:'tex'}, black_hoop:{name:'Black hoop',region:'ear',glb:G+'black_hoop.glb',disp:'black'},
  industrial:{name:'Industrial',region:'ear',glb:G+'industrial.glb',disp:'silver'},
  nostril_cz:{name:'Nostril CZ',region:'nose',glb:G+'nostril_cz.glb',disp:'tex',tex:G+'nostril_tex.jpg'}, teal_opal:{name:'Teal opal',region:'nose',glb:G+'teal_opal.glb',disp:'tex'},
  horseshoe:{name:'Horseshoe',region:'nose',glb:G+'horseshoe.glb',disp:'silver'}, clicker:{name:'Bunny',region:'nose',glb:G+'clicker.glb',disp:'tex'},
  black_spike:{name:'Black spike',region:'lip',glb:G+'black_spike.glb',disp:'black'}, silver_ball:{name:'Silver ball',region:'lip',glb:G+'silver_ball.glb',disp:'silver'},
  silver_spike:{name:'Silver spike',region:'lip',glb:G+'silver_spike.glb',disp:'silver'}, medusa_cz:{name:'Medusa',region:'lip',glb:G+'medusa_cz.glb',disp:'tex'},
  green_navel:{name:'Green navel',region:'navel',glb:G+'green_navel.glb',disp:'tex'}, navel_heart:{name:'Pink hearts',region:'navel',glb:G+'navel_heart.glb',disp:'tex'},
  rosegold_heart:{name:'Rose-gold',region:'navel',glb:G+'rosegold_heart.glb',disp:'tex'}, silver_heart:{name:'Silver heart',region:'navel',glb:G+'silver_heart.glb',disp:'tex'},
  ball_disc_navel:{name:'Ball navel',region:'navel',glb:G+'ball_disc_navel.glb',disp:'silver'}
};
const REGIONS=['ear','nose','lip','navel'];
let activeRegion='ear';

const stage=document.getElementById('stage');
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.05; renderer.outputColorSpace=THREE.SRGBColorSpace;
stage.appendChild(renderer.domElement);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(40,innerWidth/innerHeight,0.001,100);
const pmrem=new THREE.PMREMGenerator(renderer);
scene.environment=pmrem.fromScene(new RoomEnvironment(),0.5).texture;
scene.add(new THREE.HemisphereLight(0xfff4ec,0xffd9ea,0.7));
const keyL=new THREE.DirectionalLight(0xfff2e8,1.4); keyL.position.set(2,3,4); scene.add(keyL);
const rim=new THREE.DirectionalLight(0xffe3f0,0.6); rim.position.set(-3,1,-2); scene.add(rim);
const orbit=new OrbitControls(camera,renderer.domElement);
orbit.enableDamping=true; orbit.dampingFactor=0.12; orbit.minDistance=0.05; orbit.maxDistance=10; orbit.enablePan=false;

let HEAD=null,bMin=new THREE.Vector3(),bMax=new THREE.Vector3();
const draco=new DRACOLoader(); draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
const gltf=new GLTFLoader(); gltf.setDRACOLoader(draco);
const tex=new THREE.TextureLoader();
const pieceObj={};   // id -> root (placed)
let placements={};
let camcfg={};       // per-region camera angles set in the admin
let selected=null;   // only one piece shows at a time

function treat(o,p){ if(p.disp==='silver'||p.disp==='black'){const c=p.disp==='black'?0x14110f:0xeceef2,rg=p.disp==='black'?0.34:0.18;const m=new THREE.MeshStandardMaterial({color:c,metalness:1,roughness:rg,envMapIntensity:1.6});o.traverse(n=>{if(n.isMesh)n.material=m;});}else if(p.tex){const t=tex.load(p.tex);t.flipY=false;t.colorSpace=THREE.SRGBColorSpace;o.traverse(n=>{if(n.isMesh&&n.material){n.material.map=t;n.material.needsUpdate=true;}});}}

gltf.load('models/model.glb',(g)=>{
  const root=g.scene; let body=null;
  root.traverse(n=>{if(n.isMesh){const c=n.geometry.attributes.position.count; if(!body||c>body.geometry.attributes.position.count) body=n;}});
  scene.updateMatrixWorld(true);
  const bx=new THREE.Box3().setFromObject(root); const c=bx.getCenter(new THREE.Vector3()); const s=bx.getBoundingSphere(new THREE.Sphere()).radius;
  root.position.sub(c); root.scale.multiplyScalar(1/s);
  const w=new THREE.Group(); w.add(root); scene.add(w); HEAD=body; scene.updateMatrixWorld(true);
  const b2=new THREE.Box3().setFromObject(body); bMin.copy(b2.min); bMax.copy(b2.max);
  loadPlacements();
},undefined,e=>{ document.querySelector('.loading span').textContent='Could not load the 3D preview'; });

function regionView(r){ if(camcfg[r]&&camcfg[r].cam&&camcfg[r].tgt){ return {tgt:new THREE.Vector3(...camcfg[r].tgt), cam:new THREE.Vector3(...camcfg[r].cam)}; }
  const minY=bMin.y,maxY=bMax.y,H=Math.max(0.001,maxY-minY); const cx=(bMin.x+bMax.x)/2,midZ=(bMin.z+bMax.z)/2,fz=bMax.z;
  if(r==='ear') { const y=maxY-0.10*H; return {tgt:new THREE.Vector3(cx,y,midZ), cam:new THREE.Vector3(cx+0.55*H,y+0.03*H,midZ+0.20*H)}; }
  if(r==='nose'){ const y=maxY-0.13*H; return {tgt:new THREE.Vector3(cx,y,fz), cam:new THREE.Vector3(cx,y+0.01*H,fz+0.40*H)}; }
  if(r==='lip') { const y=maxY-0.19*H; return {tgt:new THREE.Vector3(cx,y,fz), cam:new THREE.Vector3(cx,y,fz+0.36*H)}; }
  const y=minY+0.10*H; return {tgt:new THREE.Vector3(cx,y,fz), cam:new THREE.Vector3(cx,y+0.05*H,fz+0.46*H)};
}
function setRegion(r,animate){ activeRegion=r; const v=regionView(r);
  if(animate===false){ camera.position.copy(v.cam); } else { flyTo(v.cam); }
  orbit.target.copy(v.tgt);
  document.querySelectorAll('#regions button').forEach(b=>b.classList.toggle('on',b.dataset.r===r));
  buildTray();
}
let fly=null;
function flyTo(p){ fly={t0:performance.now(),from:camera.position.clone(),to:p.clone()}; }
function wideView(){ const minY=bMin.y,maxY=bMax.y,H=Math.max(0.001,maxY-minY); const cx=(bMin.x+bMax.x)/2,midZ=(bMin.z+bMax.z)/2,cy=(minY+maxY)/2;
  return {tgt:new THREE.Vector3(cx,cy,midZ), cam:new THREE.Vector3(cx,cy+0.04*H,bMax.z+1.45*H)}; }
function goWide(animate){ const w=wideView(); orbit.target.copy(w.tgt); if(animate===false){ camera.position.copy(w.cam); } else { flyTo(w.cam); }
  document.querySelectorAll('#regions button').forEach(b=>b.classList.remove('on')); }

async function loadPlacements(){
  let d=null;
  try{ const r=await fetch('pb/api/collections/tryon/records?perPage=1',{cache:'no-store'}); if(r.ok){ const j=await r.json(); if(j.items&&j.items[0]) d=j.items[0].data; } }catch(e){}
  if(!d){ try{ const r=await fetch('jewelry/placements.json',{cache:'no-store'}); if(r.ok) d=await r.json(); }catch(e){} }
  if(d){ placements=d.pieces||{}; camcfg=d.cameras||{}; }
  const okNum=v=>typeof v==='number'&&isFinite(v), okArr=a=>Array.isArray(a)&&a.length===3&&a.every(okNum);
  const ids=Object.keys(placements).filter(id=>CATALOG[id]&&placements[id]&&okArr(placements[id].pos)&&okArr(placements[id].rot)&&okNum(placements[id].scale));
  await Promise.all(ids.map(id=>new Promise(res=>{
    const p=CATALOG[id]; gltf.load(p.glb,(g)=>{
      const obj=g.scene; const b=new THREE.Box3().setFromObject(obj); const cc=b.getCenter(new THREE.Vector3());
      const inner=new THREE.Group(); inner.add(obj); obj.position.sub(cc); treat(inner,p);
      const root=new THREE.Group(); root.add(inner);
      const w=placements[id]; root.position.fromArray(w.pos); root.rotation.fromArray(w.rot); root.scale.setScalar(w.scale);
      root.visible=false; scene.add(root); pieceObj[id]=root; res();
    },undefined,()=>res());
  })));
  buildRegions();
  // start by showing one piece (single-piece try-on)
  const first=Object.keys(pieceObj).find(id=>CATALOG[id].region==='ear')||Object.keys(pieceObj)[0];
  if(first){ pieceObj[first].visible=true; selected=first; }
  activeRegion='ear'; buildTray(); goWide(false);   // start on a wide shot of the whole figure
  document.getElementById('loading').classList.add('gone');
}
function buildRegions(){ const c=document.getElementById('regions'); c.innerHTML='';
  REGIONS.filter(r=>Object.keys(pieceObj).some(id=>CATALOG[id].region===r)).forEach(r=>{ const b=document.createElement('button'); b.dataset.r=r; b.textContent=r[0].toUpperCase()+r.slice(1); b.onclick=()=>setRegion(r); c.appendChild(b); }); }
function thumb(id){ return G+'thumbs/'+id+'.jpg'; }
function selectOnly(id){
  if(selected===id){ pieceObj[id].visible=false; selected=null; }
  else { if(selected&&pieceObj[selected]) pieceObj[selected].visible=false; pieceObj[id].visible=true; selected=id; }
  buildTray();
}
function buildTray(){ const t=document.getElementById('tray'); t.innerHTML='';
  Object.keys(pieceObj).filter(id=>CATALOG[id].region===activeRegion).forEach(id=>{ const p=CATALOG[id]; const on=(id===selected);
    const d=document.createElement('div'); d.className='pc'+(on?' on':'');
    d.innerHTML='<span class="th" style="background-image:url('+thumb(id)+')"></span><small>'+p.name+'</small><span class="chk">'+(on?'✓ on':'')+'</span>';
    d.onclick=()=>{ selectOnly(id); }; t.appendChild(d);
  });
}
document.getElementById('clearBtn').onclick=()=>{ if(selected&&pieceObj[selected])pieceObj[selected].visible=false; selected=null; buildTray(); };
document.getElementById('resetBtn').onclick=()=>goWide(true);
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
function loop(now){ requestAnimationFrame(loop);
  if(fly){ const t=Math.min(1,(now-fly.t0)/700); const e=t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; camera.position.lerpVectors(fly.from,fly.to,e); camera.lookAt(orbit.target); if(t>=1)fly=null; }
  else { orbit.update(); }
  renderer.render(scene,camera);
}
requestAnimationFrame(loop);
window.__try={get campos(){return camera.position.toArray().map(v=>+v.toFixed(3))}, get tgt(){return orbit.target.toArray().map(v=>+v.toFixed(3))}, setRegion, setCamcfg(c){camcfg=c}};
</script>
</body></html>
