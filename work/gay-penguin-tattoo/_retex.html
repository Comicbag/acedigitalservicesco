<!doctype html><html><head><meta charset="utf-8"><style>html,body{margin:0;height:100%;background:#fff}#s{position:fixed;inset:0}</style></head>
<body><div id="s"></div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
const qs=new URLSearchParams(location.search), URL=qs.get('m'), TEX=qs.get('tex');
const r=new THREE.WebGLRenderer({antialias:true}); r.setSize(innerWidth,innerHeight); r.setPixelRatio(Math.min(devicePixelRatio,2));
r.toneMapping=THREE.ACESFilmicToneMapping; r.toneMappingExposure=1.2; document.getElementById('s').appendChild(r.domElement);
const scene=new THREE.Scene(); scene.background=new THREE.Color(0xf2f2f4);
const cam=new THREE.PerspectiveCamera(35,innerWidth/innerHeight,0.01,100);
const pm=new THREE.PMREMGenerator(r);
const env=new THREE.Scene(); env.background=new THREE.Color(0x9aa0a8);
const soft=(x,y,z,col,s)=>{const m=new THREE.Mesh(new THREE.PlaneGeometry(s,s),new THREE.MeshBasicMaterial({color:col}));m.position.set(x,y,z);m.lookAt(0,0,0);env.add(m);};
soft(0,9,5,0xffffff,18); soft(-8,4,6,0xffffff,10); soft(7,5,-4,0xeef0f4,10); soft(0,-8,5,0xc8ccd2,12);
scene.environment=pm.fromScene(env,0.03).texture;
scene.add(new THREE.HemisphereLight(0xffffff,0xbbbbbb,0.6));
const k=new THREE.DirectionalLight(0xffffff,1.6); k.position.set(3,4,4); scene.add(k);
const k2=new THREE.DirectionalLight(0xffffff,0.9); k2.position.set(-4,1,3); scene.add(k2);
let center=new THREE.Vector3(), radius=1;
function applyTex(o){ if(!TEX) return;
  const t=new THREE.TextureLoader().load(TEX,()=>{window.__ready=true;}); t.flipY=false; t.colorSpace=THREE.SRGBColorSpace;
  o.traverse(n=>{ if(n.isMesh && n.material){ n.material.map=t; n.material.needsUpdate=true; }});
}
new GLTFLoader().load(URL,(g)=>{const o=g.scene;
  const box=new THREE.Box3().setFromObject(o);center=box.getCenter(new THREE.Vector3());radius=box.getBoundingSphere(new THREE.Sphere()).radius;scene.add(o);
  if(TEX) applyTex(o); else window.__ready=true;
},undefined,e=>{window.__err=String(e)});
window.view=(ax,ay,az)=>{cam.position.set(center.x+ax*radius,center.y+ay*radius,center.z+az*radius);cam.lookAt(center);};
function loop(){requestAnimationFrame(loop);r.render(scene,cam);} loop();
</script></body></html>
