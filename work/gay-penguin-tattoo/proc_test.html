<!doctype html><html><head><meta charset="utf-8"><style>html,body{margin:0;height:100%;background:#fff}#s{position:fixed;inset:0}</style></head>
<body><div id="s"></div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
const r=new THREE.WebGLRenderer({antialias:true}); r.setSize(innerWidth,innerHeight); r.setPixelRatio(Math.min(devicePixelRatio,2));
r.toneMapping=THREE.ACESFilmicToneMapping; r.toneMappingExposure=1.2; document.getElementById('s').appendChild(r.domElement);
const scene=new THREE.Scene(); scene.background=new THREE.Color(0xf6f6f8);
const cam=new THREE.PerspectiveCamera(35,innerWidth/innerHeight,0.01,100);
const pm=new THREE.PMREMGenerator(r);
// studio env: mid-grey body + bright white softboxes => polished steel reads as silver with highlights
const env=new THREE.Scene(); env.background=new THREE.Color(0x8b9099);
const soft=(x,y,z,col,s)=>{const m=new THREE.Mesh(new THREE.PlaneGeometry(s,s),new THREE.MeshBasicMaterial({color:col}));m.position.set(x,y,z);m.lookAt(0,0,0);env.add(m);};
soft(0,9,5,0xffffff,16); soft(-8,4,6,0xffffff,9); soft(7,5,-4,0xeef0f4,9); soft(0,-8,5,0xb4b9c0,12);
scene.environment=pm.fromScene(env,0.03).texture;
scene.add(new THREE.HemisphereLight(0xffffff,0xaaaaaa,0.5));
const k=new THREE.DirectionalLight(0xffffff,1.8); k.position.set(3,4,4); scene.add(k);
const k2=new THREE.DirectionalLight(0xffffff,0.9); k2.position.set(-4,1,3); scene.add(k2);

const steel=new THREE.MeshStandardMaterial({color:0xecedf0, metalness:1.0, roughness:0.26, envMapIntensity:1.25});
const gem=new THREE.MeshPhysicalMaterial({color:0x2ea22e, metalness:0, roughness:0.06, transmission:0.55, ior:2.3, thickness:0.4, envMapIntensity:1.3, clearcoat:1, clearcoatRoughness:0.05});

const g=new THREE.Group();
const curve=new THREE.CatmullRomCurve3([
  new THREE.Vector3(0.16,0.85,0), new THREE.Vector3(0.0,0.45,0.12),
  new THREE.Vector3(-0.05,0,0.16), new THREE.Vector3(0.0,-0.45,0.12), new THREE.Vector3(0.16,-0.85,0)]);
g.add(new THREE.Mesh(new THREE.TubeGeometry(curve,80,0.05,16), steel));
function gemSet(pos,size){const grp=new THREE.Group();
  const st=new THREE.Mesh(new THREE.OctahedronGeometry(size,0), gem); st.scale.set(1,1.3,1); grp.add(st);
  const cup=new THREE.Mesh(new THREE.CylinderGeometry(size*0.6,size*0.42,size*0.55,18), steel); cup.position.y=-size*0.85; grp.add(cup);
  for(let i=0;i<4;i++){const a=i/4*Math.PI*2+0.4;const pr=new THREE.Mesh(new THREE.CylinderGeometry(size*0.06,size*0.045,size*1.05,8), steel);
    pr.position.set(Math.cos(a)*size*0.52,0,Math.sin(a)*size*0.52); grp.add(pr);}
  grp.position.copy(pos); return grp;}
g.add(gemSet(new THREE.Vector3(0.16,0.85,0),0.10));
g.add(gemSet(new THREE.Vector3(0.16,-0.85,0),0.17));
scene.add(g);
const box=new THREE.Box3().setFromObject(g); const c=box.getCenter(new THREE.Vector3()); const rad=box.getBoundingSphere(new THREE.Sphere()).radius;
window.view=(ax,ay,az)=>{cam.position.set(c.x+ax*rad,c.y+ay*rad,c.z+az*rad);cam.lookAt(c);};
window.view(0,0,1); window.__ready=true;  // overwritten by render script
function loop(){requestAnimationFrame(loop);r.render(scene,cam);} loop();
</script></body></html>
